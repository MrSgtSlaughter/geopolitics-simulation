          <div style={S.c}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:8,opacity:.3}}>🏆 LEADERBOARD</span><button onClick={loadLB} style={{fontSize:7,background:"rgba(255,255,255,.05)",border:"none",color:"#d1d5db",borderRadius:3,padding:"1px 5px",cursor:"pointer",fontFamily:"inherit"}}>↻</button></div>{lbL&&<div style={{textAlign:"center",padding:5,opacity:.3,fontSize:8}}>Loading...</div>}{!lbL&&lbD.length===0&&<div style={{textAlign:"center",padding:5,opacity:.15,fontSize:8}}>No scores yet!</div>}{!lbL&&lbD.map((e,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 0",borderBottom:"1px solid rgba(255,255,255,.02)",fontSize:8}}><span style={{width:16,textAlign:"center",fontWeight:700,color:i<3?"#FFD700":"rgba(255,255,255,.25)"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}</span><span style={{flex:1,fontWeight:600}}>{e.name}</span><span style={{fontSize:7,color:"#F59E0B",fontWeight:600,marginRight:3}}>{e.period||""}</span><span style={{opacity:.25,fontSize:7}}>{e.nation}</span><span style={{fontWeight:700,color:"#FFD700"}}>{fmt(e.score)}</span></div>)}</div>
          <div style={{...S.c,marginTop:6}}><div style={{fontSize:8,opacity:.25,marginBottom:2}}>📜 LOG</div><div style={{maxHeight:120,overflow:"auto"}}>{log.map((e,i)=><div key={i} style={{fontSize:7,padding:"1px 0",opacity:Math.max(.15,1-i*.02)}}>{e}</div>)}</div></div>
        </div>}
      </div>

      <div style={{background:"linear-gradient(90deg,rgba(0,0,0,.8),rgba(10,20,40,.8),rgba(0,0,0,.8))",borderTop:"1px solid rgba(255,215,0,.12)",padding:"3px 10px",position:"relative",zIndex:1,overflow:"hidden",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:8,color:"#FFD700",fontWeight:700,flexShrink:0}}>📡 LIVE</span>
        <span style={{fontSize:8,color:dow>=10000?"#6EE7B7":"#EF4444",fontWeight:700,flexShrink:0}}>DOW {fmt(dow)} {dow>=10000?"▲":"▼"}</span>
        <span style={{fontSize:8,opacity:.2,flexShrink:0}}>│</span>
        <span style={{fontSize:8,color:"#3B82F6",fontWeight:700,flexShrink:0}}>OIL {fmt(res.oil||0)}</span>
        <span style={{fontSize:8,opacity:.2,flexShrink:0}}>│</span>
        <span style={{fontSize:8,color:"#A855F7",fontWeight:700,flexShrink:0}}>LITH {fmt(res.lithium||0)}</span>
        <span style={{fontSize:8,opacity:.2,flexShrink:0}}>│</span>
        {ticker.length>0?<span style={{fontSize:8,color:"#EF4444",flexShrink:0,fontWeight:600}}>⚡ {ticker[0]}</span>:<span style={{fontSize:8,opacity:.35,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📰 {HEADLINES[newsIdx]}</span>}
      </div>
      <div style={{textAlign:"center",padding:"2px 0",fontSize:6,opacity:.1,position:"relative",zIndex:1}}><a href="https://mrsgtslaughter.github.io/Total-World-Conquest-Modern-World/" target="_blank" rel="noopener" style={{color:"#FFD700",textDecoration:"none"}}>🎮 TWC</a> · Copyright © 2026 Jason Slaughter · PixelED Path, LLC · <a href="dashboard.html" target="_blank" style={{color:"#F59E0B",textDecoration:"none"}}>📊 Dashboard</a></div>
    </div>
  );
}
