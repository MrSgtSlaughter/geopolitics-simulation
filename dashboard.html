<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWC: Teacher Dashboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0f1a;color:#d1d5db;font-family:'Segoe UI',sans-serif;padding:12px}
  h1{text-align:center;font-size:22px;color:#FFD700;margin-bottom:4px}
  .sub{text-align:center;font-size:11px;opacity:.4;margin-bottom:12px}
  .tabs{display:flex;justify-content:center;gap:5px;margin-bottom:12px;flex-wrap:wrap}
  .tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;border:none;font-family:inherit;transition:all .2s}
  .tab.active{color:#000} .tab:not(.active){background:rgba(255,255,255,.06);color:rgba(255,255,255,.35)}
  .tab[data-p="1st"]{--c:#EF4444}.tab[data-p="2nd"]{--c:#10B981}.tab[data-p="5th"]{--c:#F59E0B}.tab[data-p="6th"]{--c:#3B82F6}.tab[data-p="all"]{--c:#A855F7}.tab[data-p="purchases"]{--c:#FFD700}
  .tab.active{background:var(--c)}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .sum-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px;text-align:center}
  .sum-num{font-size:22px;font-weight:800} .sum-label{font-size:9px;opacity:.4}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{text-align:left;padding:5px 6px;background:rgba(255,255,255,.06);color:#FFD700;font-size:9px;position:sticky;top:0}
  td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
  tr:hover td{background:rgba(255,255,255,.03)}
  .per{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;display:inline-block}
  .per-1st{background:rgba(239,68,68,.15);color:#EF4444}
  .per-2nd{background:rgba(16,185,129,.15);color:#10B981}
  .per-5th{background:rgba(245,158,11,.15);color:#F59E0B}
  .per-6th{background:rgba(59,130,246,.15);color:#3B82F6}
  .inv{display:inline-block;font-size:8px;padding:1px 4px;border-radius:2px;margin:1px;background:rgba(255,215,0,.1);color:#FFD700;border:1px solid rgba(255,215,0,.15)}
  .purchase-card{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.12);border-radius:8px;padding:10px;margin-bottom:8px}
  .btn{padding:6px 14px;border-radius:6px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn:hover{filter:brightness(1.15)}
  .approved{opacity:.4;border-color:rgba(16,185,129,.2)!important;background:rgba(16,185,129,.05)!important}
  .approved::after{content:" ✅ APPROVED";color:#10B981;font-weight:700}
</style>
</head>
<body>
<h1>🏛️ TWC: Teacher Dashboard</h1>
<div class="sub">Total World Conquest: The Modern Empire — Manage Classes & Approve Purchases</div>

<div style="text-align:center;margin-bottom:12px">
  <button class="btn" style="background:#FFD700;color:#000" onclick="loadAll()">🔄 Refresh</button>
  <span id="lastUpdate" style="font-size:9px;opacity:.3;margin-left:8px"></span>
</div>

<div class="tabs" id="tabs"></div>
<div class="summary" id="summary"></div>
<div id="content" style="max-height:70vh;overflow:auto"></div>

<div style="text-align:center;margin-top:16px;font-size:8px;opacity:.12">
  TWC: The Modern Empire · © 2026 Jason Slaughter · PixelED Path, LLC
</div>

<script>
const FB="https://firestore.googleapis.com/v1/projects/minigolf-fd9ea/databases/(default)/documents/twc_modern_scores";
const fbV=f=>f?Object.values(f)[0]:"";

const STORE_NAMES={ranger:"🪖 Ranger",tank:"🛡️ Tank",blockade:"🚧 Blockade",bomber:"✈️ Bomber",submarine:"🔱 Submarine",cyberattack:"💻 Cyber",carrier:"🚢 Carrier",civilunrest:"🔥 Civil Unrest",icbm:"🚀 ICBM",nuke:"☢️ Nuke"};

let scores=[];
let purchases=[];
let currentTab="all";
let approved=JSON.parse(localStorage.getItem("twc_approved")||"{}");

function saveApproved(){localStorage.setItem("twc_approved",JSON.stringify(approved))}

async function loadAll(){
  document.getElementById("content").innerHTML='<div style="text-align:center;padding:30px;opacity:.3">Loading...</div>';
  try{
    const r=await fetch(FB+"?pageSize=500");
    if(!r.ok){document.getElementById("content").innerHTML='<div style="text-align:center;padding:30px;color:#EF4444">Firebase error '+r.status+'. Check rules.</div>';return}
    const d=await r.json();
    const all=(d.documents||[]).map(x=>{
      const f=x.fields||{};
      const id=x.name.split("/").pop();
      return{id,name:fbV(f.name),nation:fbV(f.nation),gov:fbV(f.gov),score:Number(fbV(f.score))||0,period:fbV(f.period),inv:fbV(f.inv)||"{}",type:fbV(f.type)||"score",items:fbV(f.items)};
    });
    scores=all.filter(x=>x.type==="score").sort((a,b)=>b.score-a.score);
    purchases=all.filter(x=>x.type==="purchase");
    // Dedupe scores — keep highest per name+period
    const seen={};
    scores=scores.filter(s=>{const k=s.name+"_"+s.period;if(seen[k])return false;seen[k]=true;return true});
    document.getElementById("lastUpdate").textContent="Updated "+new Date().toLocaleTimeString();
    renderTabs();
    render();
  }catch(e){document.getElementById("content").innerHTML='<div style="text-align:center;padding:30px;color:#EF4444">'+e.message+'</div>'}
}

function renderTabs(){
  const periods=["all","1st","2nd","5th","6th","purchases"];
  const purchaseCount=purchases.filter(p=>!approved[p.id]).length;
  document.getElementById("tabs").innerHTML=periods.map(p=>{
    let label,count;
    if(p==="purchases"){label="🛒 Purchases";count=purchaseCount>0?` (${purchaseCount} pending)`:""}
    else if(p==="all"){label="All";count=` (${scores.length})`}
    else{label=p+" Hour";count=` (${scores.filter(s=>s.period===p).length})`}
    return`<button class="tab ${currentTab===p?'active':''}" data-p="${p}" onclick="setTab('${p}')">${label}${count}</button>`;
  }).join("");
}

function setTab(t){currentTab=t;renderTabs();render()}

function render(){
  if(currentTab==="purchases"){renderPurchases();return}
  const data=currentTab==="all"?scores:scores.filter(s=>s.period===currentTab);
  if(!data.length){document.getElementById("summary").innerHTML="";document.getElementById("content").innerHTML='<div style="text-align:center;padding:30px;opacity:.3">No scores yet for this period.</div>';return}
  
  const avg=Math.round(data.reduce((s,d)=>s+d.score,0)/data.length);
  const govCounts={};data.forEach(d=>{govCounts[d.gov]=(govCounts[d.gov]||0)+1});
  const topGov=Object.entries(govCounts).sort((a,b)=>b[1]-a[1])[0];
  const withInv=data.filter(d=>{try{const i=JSON.parse(d.inv);return Object.keys(i).length>0}catch{return false}}).length;
  
  document.getElementById("summary").innerHTML=`
    <div class="sum-card"><div class="sum-num" style="color:#3B82F6">${data.length}</div><div class="sum-label">Players</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#FFD700">${avg.toLocaleString()}</div><div class="sum-label">Avg Score</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#10B981">${topGov?topGov[0]:"-"}</div><div class="sum-label">Top Gov (${topGov?topGov[1]:0})</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#F59E0B">${withInv}</div><div class="sum-label">Have Weapons</div></div>
  `;
  
  document.getElementById("content").innerHTML=`<table>
    <thead><tr><th>#</th><th>Leader</th><th>Period</th><th>Nation</th><th>Gov</th><th>Score</th><th>Weapons Inventory</th></tr></thead>
    <tbody>${data.map((d,i)=>`<tr>
      <td style="color:#FFD700;font-weight:700">${i<3?["🥇","🥈","🥉"][i]:(i+1)}</td>
      <td style="font-weight:700">${d.name}</td>
      <td><span class="per per-${d.period}">${d.period}</span></td>
      <td>${d.nation}</td>
      <td>${d.gov}</td>
      <td style="font-weight:700;color:#FFD700">${d.score.toLocaleString()}</td>
      <td>${parseInv(d.inv)}</td>
    </tr>`).join("")}</tbody>
  </table>`;
}

function renderPurchases(){
  document.getElementById("summary").innerHTML=`
    <div class="sum-card"><div class="sum-num" style="color:#FFD700">${purchases.length}</div><div class="sum-label">Total Submissions</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#EF4444">${purchases.filter(p=>!approved[p.id]).length}</div><div class="sum-label">Pending</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#10B981">${purchases.filter(p=>approved[p.id]).length}</div><div class="sum-label">Approved</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#3B82F6">${new Set(purchases.map(p=>p.period)).size}</div><div class="sum-label">Periods</div></div>
  `;
  
  // Group by period
  const byPeriod={};
  purchases.forEach(p=>{
    if(!byPeriod[p.period])byPeriod[p.period]=[];
    byPeriod[p.period].push(p);
  });
  
  let html="";
  for(const period of ["1st","2nd","5th","6th"]){
    const items=byPeriod[period];
    if(!items||!items.length)continue;
    html+=`<div style="margin-bottom:12px">
      <h3 style="font-size:13px;margin-bottom:6px"><span class="per per-${period}">${period} Hour</span> — ${items.length} submissions</h3>`;
    for(const p of items){
      const isApproved=approved[p.id];
      html+=`<div class="purchase-card ${isApproved?'approved':''}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px;font-weight:700">${p.name}</div>
            <div style="font-size:10px;opacity:.4">${p.nation} · ${p.gov||""}</div>
          </div>
          ${isApproved?'<span style="color:#10B981;font-size:11px;font-weight:700">✅ Approved</span>':
          `<button class="btn" style="background:#10B981;color:#fff" onclick="approvePurchase('${p.id}')">✅ Approve for TWC</button>`}
        </div>
        <div style="margin-top:6px;font-size:11px"><strong>Items:</strong> ${p.items||parseInv(p.inv)}</div>
        <div style="margin-top:2px">${parseInv(p.inv)}</div>
      </div>`;
    }
    html+="</div>";
  }
  
  if(!html)html='<div style="text-align:center;padding:30px;opacity:.3">No purchase submissions yet.</div>';
  document.getElementById("content").innerHTML=html;
}

function approvePurchase(id){
  approved[id]=true;
  saveApproved();
  renderTabs();
  renderPurchases();
}

function parseInv(invStr){
  try{
    const inv=JSON.parse(invStr);
    return Object.entries(inv).filter(([k,v])=>v>0).map(([k,v])=>`<span class="inv">${STORE_NAMES[k]||k} ×${v}</span>`).join(" ")||"<span style='opacity:.3'>—</span>";
  }catch{return"<span style='opacity:.3'>—</span>"}
}

loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
